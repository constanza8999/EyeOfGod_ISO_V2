  linux  /live/vmlinuz-6.12.0-kali-amd64  ${CMDLINE} eyegod_level=PRIME skin=default
  initrd /live/initrd.img-6.12.0-kali-amd64
}

menuentry "  🟣  Kali Purple — Modo Defensivo NIST  [BLUE TEAM]" --class kali-purple {
  linux  /live/vmlinuz-6.12.0-kali-amd64  ${CMDLINE} eyegod_level=DEFENSE skin=purple components=kali-purple
  initrd /live/initrd.img-6.12.0-kali-amd64
