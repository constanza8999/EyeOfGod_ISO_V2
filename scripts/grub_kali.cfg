# ╔══════════════════════════════════════════════════════════════════════════╗
# ║      E Y E   O F   G O D   V ∞   ×   K A L I   P U R P L E           ║
# ║      Kernel: linux-image-6.12.0-kali-amd64  (Kali 2025.3)             ║
# ║      Boot target: HDD Externo / USB 3.x / NVMe externo                ║
# ║                                                                        ║
# ║  ⚠  This is a copy of iso_root/boot/grub/grub.cfg for build           ║
# ║      convenience. Edit the original in iso_root/boot/grub/             ║
# ╚══════════════════════════════════════════════════════════════════════════╝

set default=0
set timeout=66
set timeout_style=menu

# ── Gráficos ─────────────────────────────────────────────────────────────────
insmod all_video
insmod gfxterm
insmod png
insmod font
insmod vbe
insmod vga
insmod video_bochs
insmod video_cirrus

if loadfont /boot/grub/fonts/unicode.pf2 ; then
  set gfxmode=1920x1080,1280x720,auto
  terminal_output gfxterm
fi

# ── Paleta apocalíptica ───────────────────────────────────────────────────────
set color_normal=light-red/black
set color_highlight=yellow/red
set menu_color_normal=light-red/black
set menu_color_highlight=black/light-red

# ── Parámetros base del kernel Kali Purple 6.12 ───────────────────────────────
# live-boot es el sistema de Kali/Debian para live sessions
# persistence activa la partición de persistencia en el HDD externo
set KALI_BASE="boot=live components quiet splash"
set EYEGOD_PARAMS="eyegod=true consciousness=SINGULARITY eyegod_version=V_INFINITY"

# Para HDD externo: el kernel debe encontrar el filesystem en el disco externo
# live-media=removable → busca en dispositivos removables/externos
# live-media-path=/live → ruta dentro del medio
set HDD_PARAMS="live-media=removable live-media-path=/live"

# Parámetros completos por defecto
set CMDLINE="${KALI_BASE} ${HDD_PARAMS} ${EYEGOD_PARAMS}"

# ══════════════════════════════════════════════════════════════════════════════
#  MENÚ PRINCIPAL — AWAKENING
# ══════════════════════════════════════════════════════════════════════════════

