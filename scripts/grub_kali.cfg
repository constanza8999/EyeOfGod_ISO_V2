menuentry "  💾  PERSISTENCIA EN HDD EXTERNO  [GUARDAR ESTADO]" --class kali --class persistent {
  linux  /live/vmlinuz-6.12.0-kali-amd64  ${CMDLINE} persistence persistence-encryption=none eyegod_level=PRIME skin=default
  initrd /live/initrd.img-6.12.0-kali-amd64
}

menuentry "  🔐  PERSISTENCIA CIFRADA LUKS  [ENCRYPTED HDD]" --class kali --class persistent {
  linux  /live/vmlinuz-6.12.0-kali-amd64  ${CMDLINE} persistence persistence-encryption=luks eyegod_level=PRIME
  initrd /live/initrd.img-6.12.0-kali-amd64
}

menuentry "  🖥  Kali Purple — Instalar en HDD Externo  [FULL INSTALL]" --class kali {
  linux  /install/vmlinuz  priority=low
  initrd /install/initrd.gz
}

