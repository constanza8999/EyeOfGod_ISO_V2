# 👁 Eye of God V∞ × Kali Purple — CI Build
# Builds the ISO on pushes to main, PRs, and manual triggers.
# For releases, use release.yml (triggered by tags v*).

name: Build ISO

on:
  workflow_dispatch:        # Manual trigger
  push:
    branches: [ main ]
    paths:
      - 'scripts/**'
      - 'iso_root/**'
      - '.github/workflows/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'scripts/**'
      - 'iso_root/**'

env:
  DEBIAN_FRONTEND: noninteractive

jobs:
  lint:
    name: Lint Scripts
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: ShellCheck Bash Scripts
      uses: ludeeus/action-shellcheck@master
      with:
        scandir: ./scripts
        severity: warning
      continue-on-error: true
    
    - name: Check GRUB Syntax
      run: |
        echo "::notice title=GRUB::Validating grub.cfg syntax"
        # Basic validation: check for menuentry declarations
        if grep -q 'menuentry' iso_root/boot/grub/grub.cfg 2>/dev/null; then
          echo "✅ grub.cfg has menuentry declarations"
        fi
        ENTRIES=$(grep -c 'menuentry' iso_root/boot/grub/grub.cfg 2>/dev/null || echo 0)
        echo "📋 Found $ENTRIES boot entries"

  build:
    name: Build ISO
    needs: lint
    runs-on: ubuntu-latest
    container:
      image: kalilinux/kali-rolling
      options: --privileged
    # Skip build for PRs (too resource intensive)
    if: github.event_name != 'pull_request'
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        apt-get update -qq
        apt-get install -y -qq --no-install-recommends \
          xorriso squashfs-tools debootstrap \
          grub-pc-bin grub-efi-amd64-bin \
          mtools dosfstools live-build live-boot \
          cryptsetup-bin curl wget python3 python3-pip \
          memtest86+
    
    - name: Build ISO
      run: |
        bash scripts/build_kali_hdd.sh --clean .
    
    - name: List Build Output
      run: |
        ls -lh EyeOfGod_KaliPurple_*_HDD.iso 2>/dev/null || echo "No ISO found"
        echo "Build artifacts:"
        ls -la *.iso 2>/dev/null || true

    - name: Upload ISO Artifact
      uses: actions/upload-artifact@v4
      with:
        name: EyeOfGod-KaliPurple-ISO
        path: EyeOfGod_KaliPurple_*_HDD.iso
        retention-days: 30
        if-no-files-found: error
